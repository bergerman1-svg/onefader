<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneFader — Brand</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Unbounded:wght@400;500;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0E12; --panel:#14171D; --line:#232833;
    --led:#FFB454; --led-soft:rgba(255,180,84,.4);
    --text:#E8EAEF; --muted:#8B93A3;
    --mono:'JetBrains Mono',monospace; --disp:'Unbounded',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--disp);
       display:flex; flex-direction:column; align-items:center; padding:60px 24px 80px; gap:70px}
  .label{font-family:var(--mono); font-size:11px; letter-spacing:.3em; color:var(--muted);
         text-transform:uppercase; margin-bottom:26px; text-align:center}

  /* ================= HERO LOCKUP ================= */
  .hero{display:flex; flex-direction:column; align-items:center; gap:34px; padding:70px 0 30px;
        position:relative}
  .hero::before{content:""; position:absolute; inset:-40px -120px; z-index:-1;
    background:radial-gradient(50% 55% at 50% 42%, rgba(255,180,84,.09), transparent 70%)}
  .heroFader{position:relative; width:88px; height:220px}
  .heroFader .track{position:absolute; left:50%; top:0; bottom:0; width:22px;
    transform:translateX(-50%); border-radius:11px; background:#0B0D11;
    border:1px solid #262C38; box-shadow:inset 0 2px 8px rgba(0,0,0,.7)}
  .heroFader .glow{position:absolute; left:50%; transform:translateX(-50%);
    width:10px; bottom:6px; height:44%; border-radius:5px;
    background:linear-gradient(180deg,#FFD08A,var(--led));
    box-shadow:0 0 22px var(--led-soft), 0 0 60px rgba(255,180,84,.25)}
  .heroFader .cap{position:absolute; left:0; right:0; height:52px; top:38%;
    border-radius:13px; background:linear-gradient(180deg,#454E5F 0%,#2A303C 45%,#1C2029 100%);
    border:1px solid #5A6375; box-shadow:0 10px 30px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.12)}
  .heroFader .cap::after{content:""; position:absolute; left:16px; right:16px; top:50%;
    height:3px; transform:translateY(-50%); border-radius:2px; background:var(--led);
    box-shadow:0 0 12px var(--led)}
  .heroWord{font-size:clamp(38px,8vw,58px); line-height:1; letter-spacing:.01em; text-align:center}
  .heroWord .one{font-weight:400; color:var(--text)}
  .heroWord .fdr{font-weight:800; color:var(--led); text-shadow:0 0 34px var(--led-soft)}
  .heroTag{font-family:var(--mono); font-size:13px; letter-spacing:.5em; color:var(--muted);
    text-indent:.5em; text-align:center}

  /* ================= VARIATIONS ROW ================= */
  .row{display:flex; flex-wrap:wrap; gap:26px; justify-content:center; max-width:900px}
  .tile{background:var(--panel); border:1px solid var(--line); border-radius:18px;
        padding:38px 44px; display:flex; align-items:center; justify-content:center; min-height:150px}

  /* icon-only: app badge */
  .appBadge{width:96px; height:96px; border-radius:24px; position:relative;
    background:linear-gradient(165deg,#1B2029,#0E1116);
    border:1px solid #2B313D; display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 34px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06)}
  .appBadge::before{content:""; position:absolute; inset:-2px; border-radius:26px; z-index:-1;
    background:radial-gradient(60% 60% at 50% 25%, rgba(255,180,84,.4), transparent 70%); filter:blur(10px)}
  .miniFader{position:relative; width:38px; height:62px}
  .miniFader .track{position:absolute; left:50%; top:0; bottom:0; width:9px; transform:translateX(-50%);
    border-radius:5px; background:#0B0D11; border:1px solid #262C38}
  .miniFader .glow{position:absolute; left:50%; transform:translateX(-50%); width:4px; bottom:3px;
    height:42%; border-radius:2px; background:var(--led); box-shadow:0 0 10px var(--led-soft)}
  .miniFader .cap{position:absolute; left:0; right:0; height:17px; top:36%;
    border-radius:5px; background:linear-gradient(180deg,#454E5F,#20242D); border:1px solid #5A6375}
  .miniFader .cap::after{content:""; position:absolute; left:6px; right:6px; top:50%; height:2px;
    transform:translateY(-50%); background:var(--led); border-radius:1px; box-shadow:0 0 6px var(--led)}

  /* horizontal lockup */
  .hlock{display:flex; align-items:center; gap:16px}
  .hlock .word{font-size:24px; line-height:1}
  .hlock .one{font-weight:400} .hlock .fdr{font-weight:800; color:var(--led)}
  .hlock small{display:block; font-family:var(--mono); font-size:9px; letter-spacing:.34em;
    color:var(--muted); margin-top:5px}

  /* monochrome */
  .monoLock{font-size:26px; color:var(--text)}
  .monoLock .one{font-weight:400} .monoLock .fdr{font-weight:800}
</style>
</head>
<body>

<section class="hero">
  <div class="heroFader">
    <div class="track"></div>
    <div class="glow"></div>
    <div class="cap"></div>
  </div>
  <div class="heroWord"><span class="one">ONE</span><span class="fdr">FADER</span></div>
  <div class="heroTag">ONE MOVE. DONE.</div>
</section>

<section>
  <div class="label">App icon</div>
  <div class="row">
    <div class="tile">
      <div class="appBadge">
        <div class="miniFader">
          <div class="track"></div><div class="glow"></div><div class="cap"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="label">Horizontal lockup</div>
  <div class="row">
    <div class="tile">
      <div class="hlock">
        <div class="miniFader" style="width:26px;height:44px">
          <div class="track"></div><div class="glow"></div><div class="cap" style="height:13px"></div>
        </div>
        <div class="word">
          <span class="one">ONE</span><span class="fdr">FADER</span>
          <small>ONE&nbsp;MOVE.&nbsp;DONE.</small>
        </div>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="label">Monochrome / small use</div>
  <div class="row">
    <div class="tile"><div class="monoLock"><span class="one">ONE</span><span class="fdr">FADER</span></div></div>
  </div>
</section>

</body>
</html>
