name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pywebview pycaw comtypes websockets qrcode pillow

      - name: Build OneFader.exe
        run: >
          pyinstaller --onefile --windowed --name OneFader
          --icon OneFader.ico
          --add-data "ui.html;."
          --add-data "remote.html;."
          onefader.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneFader-Windows
          path: dist/OneFader.exe

      - name: Publish to "win-latest" release (keeps cumulative download count)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG=win-latest
          NOTES_HEAD="Automated Windows build. Double-click OneFader.exe to run — no Python needed."
          if gh release view "$TAG" >/dev/null 2>&1; then
            # count downloads of the asset we are about to replace, add to the running total
            CUR=$(gh api "repos/$REPO/releases/tags/$TAG" \
                  --jq '[.assets[] | select(.name=="OneFader.exe") | .download_count] | add // 0')
            PREV=$(gh release view "$TAG" --json body --jq .body \
                   | grep -oE 'Total downloads \(all versions\): [0-9]+' | grep -oE '[0-9]+' || true)
            TOTAL=$(( ${PREV:-0} + ${CUR:-0} ))
            gh release upload "$TAG" dist/OneFader.exe --clobber
            gh release edit "$TAG" --notes "$NOTES_HEAD

          Total downloads (all versions): $TOTAL"
          else
            gh release create "$TAG" dist/OneFader.exe \
              --title "OneFader for Windows — latest" \
              --notes "$NOTES_HEAD

          Total downloads (all versions): 0"
          fi
